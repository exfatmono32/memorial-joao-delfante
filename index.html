<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorial João Delfante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      text-align: center;
      overflow: hidden;
    }

    .hero-small {
      font-family: "Montserrat", sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      margin: 0 0 8px 0;
      opacity: 0;
      animation: memorialAway 2.4s ease forwards;
    }

    .hero h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.95;
      margin: 0;
      opacity: 0;
      animation: nameCome 2.4s ease forwards;
      animation-delay: 0.35s;
    }

    @keyframes memorialAway {
      0% {
        transform: scale(1.35) translateY(0);
        opacity: 0;
      }
      25% {
        opacity: 1;
      }
      100% {
        transform: scale(0.82) translateY(-10px);
        opacity: 1;
      }
    }

    @keyframes nameCome {
      0% {
        transform: scale(0.55) translateY(24px);
        opacity: 0;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body class="home-page">
  <main class="home-container">
    <header class="hero">
      <p class="hero-small">MEMORIAL</p>
      <h1>JOÃO DELFANTE</h1>
    </header>

    <nav class="menu-grid" aria-label="Seções do memorial">
      <a class="menu-button" href="homenagens.html">Homenagens</a>
      <a class="menu-button" href="materias-jornais.html">Matérias Jornais</a>
      <a class="menu-button" href="sua-historia.html">Sua história</a>
      <a class="menu-button" href="materias-videos.html">Matérias Jornais Vídeos</a>
      <a class="menu-button" href="memorias.html">Memórias</a>
      <a class="menu-button" href="missao.html">Missão</a>
    </nav>
  </main>
</body>
</html>
