<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memorial João Delfante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    .intro-screen {
      position: fixed;
      inset: 0;
      background: #e9eaec;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: introFadeOut 1s ease forwards;
      animation-delay: 5.2s;
    }

    .intro-text-wrap {
      position: relative;
      width: 100%;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .intro-memorial,
    .intro-name {
      position: absolute;
      text-align: center;
      color: #111;
      margin: 0;
      opacity: 0;
      white-space: nowrap;
    }

    .intro-memorial {
      font-family: "Montserrat", sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      animation: memorialAppear 2.2s ease forwards;
    }

    .intro-name {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.3rem, 9vw, 7rem);
      line-height: 1;
      animation: nameZoom 2.4s ease forwards;
      animation-delay: 2.4s;
    }

    .home-container {
      opacity: 0;
      animation: showHome 0.8s ease forwards;
      animation-delay: 5.3s;
    }

    @keyframes memorialAppear {
      0% {
        opacity: 0;
        transform: scale(0.96);
        filter: blur(8px);
      }
      20% {
        opacity: 1;
        filter: blur(4px);
      }
      45% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
      75% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
      100% {
        opacity: 0;
        transform: scale(1.03);
        filter: blur(6px);
      }
    }

    @keyframes nameZoom {
      0% {
        opacity: 0;
        transform: scale(0.78);
        filter: blur(8px);
      }
      30% {
        opacity: 1;
        filter: blur(3px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes introFadeOut {
      to {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    }

    @keyframes showHome {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body class="home-page">
  <div class="intro-screen" aria-hidden="true">
    <div class="intro-text-wrap">
      <h2 class="intro-memorial">Memorial</h2>
      <h1 class="intro-name">João Delfante</h1>
    </div>
  </div>

  <main class="home-container">
    <header class="hero">
      <p class="hero-small">MEMORIAL</p>
      <h1>JOÃO DELFANTE</h1>
    </header>

    <nav class="menu-grid" aria-label="Seções do memorial">
      <a class="menu-button" href="homenagens.html">Homenagens</a>
      <a class="menu-button" href="materias-jornais.html">Matérias Jornais</a>
      <a class="menu-button" href="sua-historia.html">Sua história</a>
      <a class="menu-button" href="materias-videos.html">Matérias Jornais Vídeos</a>
      <a class="menu-button" href="memorias.html">Memórias</a>
      <a class="menu-button" href="missao.html">Missão</a>
    </nav>
  </main>
</body>
</html>
